<html>
<body>
    <div class="login">
       <h1>Customer Churn Prediction</h1>

       <form action="{{ url_for('predict_datapoint')}}" method="post">
        <h1>
            <legend>Telco Customer Churn Prediction</legend>
        </h1>

        <div class="mb-3">
            <label class="form-label">Tenure (months)</label>
            <input class="form-control" type="number" name="tenure"
                placeholder="Enter tenure in months" min='0' max='100' required />
        </div>

        <div class="mb-3">
            <label class="form-label">Monthly Charges</label>
            <input class="form-control" type="number" step="0.01" name="MonthlyCharges"
                placeholder="Enter monthly charges" min='0' required />
        </div>

        <div class="mb-3">
            <label class="form-label">Total Charges</label>
            <input class="form-control" type="number" step="0.01" name="TotalCharges"
                placeholder="Enter total charges" min='0' required />
        </div>

        <div class="mb-3">
            <label class="form-label">Gender</label>
            <select class="form-control" name="gender" required>
                <option class="placeholder" selected disabled value="">Select Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Senior Citizen</label>
            <select class="form-control" name="SeniorCitizen" required>
                <option class="placeholder" selected disabled value="">Is the customer a senior citizen?</option>
                <option value="0">No</option>
                <option value="1">Yes</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Partner</label>
            <select class="form-control" name="Partner" required>
                <option class="placeholder" selected disabled value="">Does the customer have a partner?</option>
                <option value="Yes">Yes</option>
                <option value="No">No</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Dependents</label>
            <select class="form-control" name="Dependents" required>
                <option class="placeholder" selected disabled value="">Does the customer have dependents?</option>
                <option value="Yes">Yes</option>
                <option value="No">No</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Phone Service</label>
            <select class="form-control" name="PhoneService" required>
                <option class="placeholder" selected disabled value="">Does the customer have phone service?</option>
                <option value="Yes">Yes</option>
                <option value="No">No</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Multiple Lines</label>
            <select class="form-control" name="MultipleLines" required>
                <option class="placeholder" selected disabled value="">Does the customer have multiple lines?</option>
                <option value="Yes">Yes</option>
                <option value="No">No</option>
                <option value="No phone service">No phone service</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Internet Service</label>
            <select class="form-control" name="InternetService" required>
                <option class="placeholder" selected disabled value="">Select internet service type</option>
                <option value="DSL">DSL</option>
                <option value="Fiber optic">Fiber optic</option>
                <option value="No">No</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Online Security</label>
            <select class="form-control" name="OnlineSecurity" required>
                <option class="placeholder" selected disabled value="">Does the customer have online security?</option>
                <option value="Yes">Yes</option>
                <option value="No">No</option>
                <option value="No internet service">No internet service</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Online Backup</label>
            <select class="form-control" name="OnlineBackup" required>
                <option class="placeholder" selected disabled value="">Does the customer have online backup?</option>
                <option value="Yes">Yes</option>
                <option value="No">No</option>
                <option value="No internet service">No internet service</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Device Protection</label>
            <select class="form-control" name="DeviceProtection" required>
                <option class="placeholder" selected disabled value="">Does the customer have device protection?</option>
                <option value="Yes">Yes</option>
                <option value="No">No</option>
                <option value="No internet service">No internet service</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Tech Support</label>
            <select class="form-control" name="TechSupport" required>
                <option class="placeholder" selected disabled value="">Does the customer have tech support?</option>
                <option value="Yes">Yes</option>
                <option value="No">No</option>
                <option value="No internet service">No internet service</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Streaming TV</label>
            <select class="form-control" name="StreamingTV" required>
                <option class="placeholder" selected disabled value="">Does the customer have streaming TV?</option>
                <option value="Yes">Yes</option>
                <option value="No">No</option>
                <option value="No internet service">No internet service</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Streaming Movies</label>
            <select class="form-control" name="StreamingMovies" required>
                <option class="placeholder" selected disabled value="">Does the customer have streaming movies?</option>
                <option value="Yes">Yes</option>
                <option value="No">No</option>
                <option value="No internet service">No internet service</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Contract</label>
            <select class="form-control" name="Contract" required>
                <option class="placeholder" selected disabled value="">Select contract type</option>
                <option value="Month-to-month">Month-to-month</option>
                <option value="One year">One year</option>
                <option value="Two year">Two year</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Paperless Billing</label>
            <select class="form-control" name="PaperlessBilling" required>
                <option class="placeholder" selected disabled value="">Does the customer use paperless billing?</option>
                <option value="Yes">Yes</option>
                <option value="No">No</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Payment Method</label>
            <select class="form-control" name="PaymentMethod" required>
                <option class="placeholder" selected disabled value="">Select payment method</option>
                <option value="Electronic check">Electronic check</option>
                <option value="Mailed check">Mailed check</option>
                <option value="Bank transfer (automatic)">Bank transfer (automatic)</option>
                <option value="Credit card (automatic)">Credit card (automatic)</option>
            </select>
        </div>

        <div class="mb-3">
            <input class="btn btn-primary" type="submit" value="Predict Customer Churn" required />
        </div>
    </form>

    <h2>
       THE prediction is {{results}}
    </h2>
   <body>
</html>
